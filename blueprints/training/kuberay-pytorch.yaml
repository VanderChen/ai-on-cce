apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: pytorch-dist-train
  namespace: ai-workloads
spec:
  entrypoint: python train.py
  rayClusterSpec:
    headGroupSpec:
      template:
        spec:
          containers:
          - name: ray-head
            image: rayproject/ray-ml:latest
    workerGroupSpecs:
    - replicas: 2
      minReplicas: 2
      maxReplicas: 5
      groupName: gpu-group
      rayStartParams: {}
      template:
        spec:
          containers:
          - name: ray-worker
            image: rayproject/ray-ml:latest
            resources:
              limits:
                nvidia.com/gpu: 1
