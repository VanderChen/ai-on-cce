apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama3
  namespace: ai-workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llama3
  template:
    metadata:
      labels:
        app: vllm-llama3
    spec:
      containers:
      - name: vllm-engine
        image: vllm/vllm-openai:latest
        args: ["--model", "meta-llama/Meta-Llama-3-8B"]
        resources:
          limits:
            nvidia.com/gpu: 1
